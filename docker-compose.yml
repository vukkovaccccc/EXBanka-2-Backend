services:
  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    restart: always
    environment:
      POSTGRES_USER: bank_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: bank_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_admin -d bank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bank_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    networks:
      - bank-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: bank_migrate
    volumes:
      - ./services/user-service/internal/database/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://bank_admin:super_secret_password@db:5432/bank_db?sslmode=disable"
      - "up"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net

  migrate-bank:
    image: migrate/migrate
    container_name: bank_migrate_bank
    volumes:
      - ./services/bank-service/internal/database/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://bank_admin:super_secret_password@db:5432/bank_db?sslmode=disable"
      - "up"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/user-service/cmd/server
    container_name: bank_user_service
    restart: on-failure
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=bank_admin
      - DB_PASSWORD=super_secret_password
      - DB_NAME=bank_db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-access-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - BANK_SERVICE_ADDR=http://bank-service:8080
    ports:
      - "8082:8080"   # host 8082 → container 8080
      - "50052:50051" # host 50052 → container 50051
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - bank-net

  bank-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/bank-service/cmd/server
    container_name: bank_bank_service
    restart: on-failure
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=bank_admin
      - DB_PASSWORD=super_secret_password
      - DB_NAME=bank_db
      - HTTP_ADDR=0.0.0.0:8080
      - GRPC_ADDR=0.0.0.0:50051
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-access-secret}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - WORKER_INTERVAL_HOURS=24
      - RETRY_AFTER_HOURS=72
      - LATE_PAYMENT_PENALTY_PCT=0.05
      - EODHD_API_KEY=${EODHD_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
    ports:
      - "8083:8080"   # host 8083 → container 8080
      - "50053:50051" # host 50053 → container 50051
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate-bank:
        condition: service_completed_successfully
    networks:
      - bank-net

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/notification-service/cmd/server
    container_name: bank_notification_service
    restart: on-failure
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bank-net

networks:
  bank-net:
    driver: bridge

volumes:
  pgdata:
