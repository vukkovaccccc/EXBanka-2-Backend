name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run go mod tidy
        run: go mod tidy
      - name: Check go.mod / go.sum are up to date
        run: git diff --exit-code -- go.mod go.sum

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.0
          args: --timeout=5m

  generated:
    name: generated files up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.28.0
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@v2.28.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install mockery
        run: go install github.com/vektra/mockery/v2@latest
      - name: Regenerate proto + swagger
        run: make proto
      - name: Regenerate mocks
        run: make generate-mocks
      - name: Check generated files are up to date
        run: |
          git diff --exit-code -- proto/ docs/swagger/ 'services/*/mocks/' || {
            echo "Generated files are out of date. Run 'make proto' and 'make generate-mocks' and commit the result." >&2
            exit 1
          }

  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bank-service, notification-service, user-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test -count=1 ./services/${{ matrix.service }}/...

  build-go:
    name: go build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bank-service, notification-service, user-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -o /tmp/${{ matrix.service }} ./services/${{ matrix.service }}/cmd/server

  docker-build:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [fmt, tidy, lint, generated, test, build-go]
    strategy:
      fail-fast: false
      matrix:
        service: [bank-service, notification-service, user-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: |
            SERVICE_PATH=services/${{ matrix.service }}/cmd/server
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  docker-push:
    name: docker push (${{ matrix.service }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [bank-service, notification-service, user-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            SERVICE_PATH=services/${{ matrix.service }}/cmd/server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
