version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
  settings:
    staticcheck:
      checks:
        - all
        - -QF1003
        - -QF1005
        - -QF1008
        - -ST1000
        - -ST1003
  exclusions:
    generated: lax
    paths:
      - proto
      - docs/swagger
      - services/.*/mocks
    rules:
      - path: _test\.go
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt
