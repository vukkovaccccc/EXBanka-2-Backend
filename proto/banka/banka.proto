syntax = "proto3";

package banka.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "banka-backend/proto/banka;bankav1";

// ─── Valute ───────────────────────────────────────────────────────────────────

// Currency predstavlja podržanu valutu u sistemu.
message Currency {
  int64  id     = 1;
  string naziv  = 2; // e.g. "Srpski dinar"
  string oznaka = 3; // ISO 4217 kod, e.g. "RSD", "EUR"
}

message GetCurrenciesResponse {
  repeated Currency valute = 1;
}

// ─── Delatnosti ───────────────────────────────────────────────────────────────

// Delatnost predstavlja šifarnik delatnosti (klasifikacija privrednih subjekata).
message Delatnost {
  int64  id     = 1;
  string sifra  = 2; // šifra delatnosti, e.g. "6411"
  string naziv  = 3;
  string grana  = 4;
  string sektor = 5;
}

message GetDelatnostiResponse {
  repeated Delatnost delatnosti = 1;
}

// ─── CreateAccount ────────────────────────────────────────────────────────────

// Firma se popunjava samo za poslovne račune; za fizička lica ostaje null.
message Firma {
  string naziv        = 1;
  string maticni_broj = 2;
  string pib          = 3;
  int64  delatnost_id = 4;
  string adresa       = 5;
  int64  vlasnik_id   = 6;
}

message CreateAccountRequest {
  int64           zaposleni_id      = 1; // ID zaposlenog koji kreira račun
  int64           vlasnik_id        = 2; // ID vlasnika računa (klijent)
  int64           valuta_id         = 3;
  optional Firma  firma             = 4; // null za fizička lica
  string          kategorija_racuna = 5;
  string          vrsta_racuna      = 6;
  string          podvrsta          = 7;
  string          naziv             = 8;
  double          stanje            = 9; // početno stanje računa
  bool            kreiraj_karticu   = 10;
  string          tip_kartice       = 11; // "VISA" | "MASTERCARD" | "DINACARD" | "AMEX"; default VISA
}

message CreateAccountResponse {
  int64 id = 1; // ID novokreiranog računa
}

// ─── GetClientAccounts ────────────────────────────────────────────────────────

// AccountListItem je minimalna projekcija računa za listu.
message AccountListItem {
  int64  id                   = 1;
  string broj_racuna          = 2;
  string naziv_racuna         = 3;
  string vrsta_racuna         = 4;  // "LICNI" | "POSLOVNI"
  string kategorija_racuna    = 5;  // "TEKUCI" | "DEVIZNI"
  string valuta_oznaka        = 6;
  double stanje_racuna        = 7;
  double rezervisana_sredstva = 8;
  double raspolozivo_stanje   = 9;
}

message GetClientAccountsResponse {
  repeated AccountListItem accounts = 1;
}

// ─── GetAccountDetail ─────────────────────────────────────────────────────────

message GetAccountDetailRequest {
  int64 id = 1;
}

// AccountDetail je detaljna projekcija računa.
message AccountDetail {
  int64  id                   = 1;
  string broj_racuna          = 2;
  string naziv_racuna         = 3;
  string vrsta_racuna         = 4;
  string kategorija_racuna    = 5;
  string valuta_oznaka        = 6;
  double stanje_racuna        = 7;
  double rezervisana_sredstva = 8;
  double raspolozivo_stanje   = 9;
  double dnevni_limit         = 10;
  double mesecni_limit        = 11;
  optional string naziv_firme = 12; // samo za POSLOVNI račun
}

// ─── GetAccountTransactions ───────────────────────────────────────────────────

message GetAccountTransactionsRequest {
  int64  racun_id   = 1;
  string sort_by    = 2; // "datum" | "tip"
  string sort_order = 3; // "ASC" | "DESC"
}

// Transakcija je projekcija jednog zapisa o transakciji.
message Transakcija {
  int64  id                = 1;
  int64  racun_id          = 2;
  string tip_transakcije   = 3;
  double iznos             = 4;
  string opis              = 5;
  string vreme_izvrsavanja = 6; // ISO 8601 string
  string status            = 7;
}

message GetAccountTransactionsResponse {
  repeated Transakcija transactions = 1;
}

// ─── RenameAccount ────────────────────────────────────────────────────────────

message RenameAccountRequest {
  int64  id         = 1;
  string novi_naziv = 2;
}

// ─── UpdateAccountLimit ───────────────────────────────────────────────────────
// Kreira pending action za promenu limita — mora se odobriti putem mobilne app.

message UpdateAccountLimitRequest {
  int64  id            = 1;
  double dnevni_limit  = 2;
  double mesecni_limit = 3;
}

message UpdateAccountLimitResponse {
  int64  action_id = 1; // ID pending akcije za verifikaciju
  string status    = 2; // "AWAITING_VERIFICATION"
}

// ─── Pending Actions (Verifikacija) ──────────────────────────────────────────

// PendingActionItem — projekcija za mobilni prikaz.
// Polja su nazvana tako da odgovaraju postojećim DTO-ovima u mobilnoj aplikaciji.
message PendingActionItem {
  int64  id               = 1;
  string action_type      = 2;  // "PROMENA_LIMITA"
  string recipient_name   = 3;  // naziv akcije, npr. "Promena limita"
  string recipient_account= 4;  // broj racuna
  double amount           = 5;  // dnevni limit
  string currency         = 6;  // valuta računa
  string purpose          = 7;  // "Dnevni: X / Mesečni: Y"
  string created_at       = 8;  // ISO 8601
  string status           = 9;  // "PENDING"
}

message GetPendingActionsResponse {
  repeated PendingActionItem transactions = 1;
}

message GetPendingActionRequest {
  int64 id = 1;
}

message GetPendingActionResponse {
  PendingActionItem transaction = 1;
}

message ApprovePendingActionRequest {
  int64 id = 1;
}

message ApprovePendingActionResponse {
  string verification_code  = 1;
  string expires_at         = 2;
  int32  expires_in_seconds = 3;
}

message VerifyLimitChangeRequest {
  int64  id   = 1;  // pending_action.id (in path)
  string code = 2;  // 6-cifreni kod
}

// ─── Payment Recipient ────────────────────────────────────────────────────────

message PaymentRecipientItem {
  int64  id          = 1;
  string naziv       = 2;
  string broj_racuna = 3;
}

message GetPaymentRecipientsResponse {
  repeated PaymentRecipientItem recipients = 1;
}

message CreatePaymentRecipientRequest {
  string naziv       = 1;
  string broj_racuna = 2;
}

message UpdatePaymentRecipientRequest {
  int64  id          = 1;
  string naziv       = 2;
  string broj_racuna = 3;
}

message DeletePaymentRecipientRequest {
  int64 id = 1;
}

// ─── Payment Intent ───────────────────────────────────────────────────────────

// CreatePaymentIntentRequest — kreiranje naloga plaćanja između klijenata.
message CreatePaymentIntentRequest {
  string idempotency_key      = 1;  // UUID koji generiše frontend
  int64  racun_platioca_id    = 2;
  string broj_racuna_primaoca = 3;
  string naziv_primaoca       = 4;
  double iznos                = 5;
  string sifra_placanja       = 6;  // 3 cifre, počinje sa 2
  string poziv_na_broj        = 7;  // opciono
  string svrha_placanja       = 8;
}

// CreateTransferIntentRequest — kreiranje prenosa između računa istog klijenta.
message CreateTransferIntentRequest {
  string idempotency_key   = 1;
  int64  racun_platioca_id = 2;
  int64  racun_primaoca_id = 3;
  double iznos             = 4;
  string svrha_placanja    = 5;
}

// CreatePaymentIntentResponse — odgovor pri kreiranju naloga.
message CreatePaymentIntentResponse {
  int64  intent_id       = 1;  // ID payment_intent-a
  int64  action_id       = 2;  // ID pending_action-a za mobilnu verifikaciju
  string broj_naloga     = 3;
  string status          = 4;  // "U_OBRADI"
  string valuta          = 5;
  double iznos           = 6;
  double krajnji_iznos   = 7;  // iznos koji primalac dobija (u valuti primaoca); 0 = ista valuta
  double provizija       = 8;  // provizija u valuti primaoca; 0 = ista valuta
  double kurs            = 9;  // efektivni kurs konverzije; 0 = ista valuta
  string valuta_primaoca = 10; // valuta primaoca; prazno = ista valuta kao platioc
}

// VerifyPaymentRequest — verifikacija koda i izvršenje naloga.
message VerifyPaymentRequest {
  int64  intent_id = 1;
  string code      = 2;
}

// PaymentIntentItem — detalji jednog naloga plaćanja.
message PaymentIntentItem {
  int64  id                   = 1;
  string idempotency_key      = 2;
  string broj_naloga          = 3;
  string tip_transakcije      = 4;  // "PLACANJE" | "PRENOS"
  string broj_racuna_platioca = 5;
  string broj_racuna_primaoca = 6;
  string naziv_primaoca       = 7;
  double iznos                = 8;
  double krajnji_iznos        = 9;
  double provizija            = 10;
  string valuta               = 11;
  string sifra_placanja       = 12;
  string poziv_na_broj        = 13;
  string svrha_placanja       = 14;
  string status               = 15;  // "U_OBRADI" | "REALIZOVANO" | "ODBIJENO"
  string created_at           = 16;  // ISO 8601
  string executed_at          = 17;  // ISO 8601, prazan ako nije izvršen
  string failed_reason        = 18;
  int64  intent_id            = 19;  // alias za id, za frontend kompatibilnost
  double kurs                 = 20;  // efektivni kurs konverzije; 0 = ista valuta
  string valuta_primaoca      = 21;  // valuta primaoca; prazno = ista valuta
}

message GetPaymentHistoryRequest {
  string date_from   = 1;  // ISO 8601, opciono
  string date_to     = 2;  // ISO 8601, opciono
  double min_iznos   = 3;  // 0 = bez filtera
  double max_iznos   = 4;  // 0 = bez filtera
  string status      = 5;  // "" = sve
}

message GetPaymentHistoryResponse {
  repeated PaymentIntentItem payments = 1;
}

message GetPaymentDetailRequest {
  int64 id = 1;
}

// ─── Krediti (Loans) ──────────────────────────────────────────────────────────

// Credit (Kredit) — pun zapis o kreditu klijenta.
message Credit {
  int64  id                      = 1;
  string broj_kredita            = 2;  // jedinstveni identifikator kredita
  string broj_racuna             = 3;  // FK na račun klijenta
  string vrsta_kredita           = 4;  // GOTOVINSKI | STAMBENI | AUTO | REFINANSIRAJUCI | STUDENTSKI
  string iznos_kredita           = 5;  // decimal kao string (precision-safe)
  int32  period_otplate          = 6;  // u mesecima
  string nominalna_kamatna_stopa = 7;  // nominal interest rate kao string
  string efektivna_kamatna_stopa = 8;  // effective interest rate kao string
  string datum_ugovaranja        = 9;  // ISO 8601 date
  string datum_isplate           = 10; // ISO 8601 date — datum kada je novac uplaćen
  string iznos_mesecne_rate      = 11; // decimal kao string
  string datum_sledece_rate      = 12; // ISO 8601 date
  string preostalo_dugovanje     = 13; // decimal kao string
  string valuta                  = 14; // ISO 4217 kod, e.g. "RSD", "EUR"
  string status                  = 15; // ODOBREN | ODBIJEN | OTPLACEN | U_KASNJENJU
  string tip_kamate              = 16; // FIKSNI | VARIJABILNI
}

// Installment (Rata) — jedan zapis o rati kredita.
message Installment {
  int64  id                      = 1;
  int64  kredit_id               = 2;  // FK na Credit
  string iznos_rate              = 3;  // decimal kao string
  string iznos_kamatne_stope     = 4;  // kamata u ovoj rati, decimal kao string
  string valuta                  = 5;
  string ocekivani_datum_dospeca = 6;  // ISO 8601 date
  string pravi_datum_dospeca     = 7;  // ISO 8601 date; prazan dok novac nije skinut
  string status_placanja         = 8;  // PLACENO | NEPLACENO | KASNI
}

// CreditRequest — zahtev klijenta za kredit koji ceka obradu zaposlenog.
message CreditRequest {
  int64  id                  = 1;
  int64  klijent_id          = 2;
  string vrsta_kredita       = 3;
  string tip_kamate          = 4;
  string iznos_kredita       = 5;  // decimal kao string
  string valuta              = 6;
  string svrha_kredita       = 7;
  string iznos_mesecne_plate = 8;  // decimal kao string
  string status_zaposlenja   = 9;  // STALNO | PRIVREMENO | NEZAPOSLEN
  int32  period_zaposlenja   = 10; // u mesecima
  string kontakt_telefon     = 11;
  string broj_racuna         = 12; // racun na koji se uplacuje i sa kojeg se skida rata
  int32  rok_otplate         = 13; // u mesecima
  string datum_podnosenja    = 14; // ISO 8601 datetime
  string status              = 15; // NA_CEKANJU | ODOBREN | ODBIJEN
}

// ─── ApplyForCredit ───────────────────────────────────────────────────────────

message ApplyForCreditRequest {
  string vrsta_kredita       = 1;
  string tip_kamate          = 2;
  string iznos_kredita       = 3;
  string valuta              = 4;
  string svrha_kredita       = 5;
  string iznos_mesecne_plate = 6;
  string status_zaposlenja   = 7;
  int32  period_zaposlenja   = 8;
  string kontakt_telefon     = 9;
  string broj_racuna         = 10;
  int32  rok_otplate         = 11;
}

message ApplyForCreditResponse {
  int64  id               = 1;
  string status           = 2;
  string datum_podnosenja = 3;
}

// ─── GetClientCredits ─────────────────────────────────────────────────────────
// Request: google.protobuf.Empty — klijent se identifikuje kroz JWT.

message GetClientCreditsResponse {
  repeated Credit credits = 1;
}

// ─── GetCreditDetails ─────────────────────────────────────────────────────────

message GetCreditDetailsRequest {
  int64 id = 1;
}

message GetCreditDetailsResponse {
  Credit               kredit = 1;
  repeated Installment rate   = 2;
}

// ─── ApproveCredit ────────────────────────────────────────────────────────────

message ApproveCreditRequest {
  int64 id = 1; // ID zahteva za kredit (CreditRequest)
}

message ApproveCreditResponse {
  Credit kredit = 1;
}

// ─── RejectCredit ─────────────────────────────────────────────────────────────
// Response: google.protobuf.Empty

message RejectCreditRequest {
  int64 id = 1; // ID zahteva za kredit (CreditRequest)
}

// ─── GetAllCreditRequests (Employee) ──────────────────────────────────────────

message GetAllCreditRequestsRequest {
  string vrsta_kredita = 1; // opcioni filter; "" = sve vrste
  string broj_racuna   = 2; // opcioni filter; "" = svi racuni
}

message GetAllCreditRequestsResponse {
  repeated CreditRequest zahtevi = 1;
}

// ─── GetAllApprovedCredits (Employee) ─────────────────────────────────────────

message GetAllApprovedCreditsRequest {
  string vrsta_kredita = 1; // opcioni filter
  string broj_racuna   = 2; // opcioni filter
  string status        = 3; // opcioni filter; "" = svi statusi
}

message GetAllApprovedCreditsResponse {
  repeated Credit krediti = 1;
}
// ─── Menjačnica ───────────────────────────────────────────────────────────────
// NOTE: GetExchangeRates and CalculateExchange are served as plain HTTP handlers
// (not gRPC) at GET /bank/exchange-rates. Proto definitions below are provided
// for documentation and future migration once protoc tooling is available.
//
// GET /bank/exchange-rates              → kursna lista (JSON: { rates: [...] })
// GET /bank/exchange-rates?from=X&to=Y&amount=Z → konverzija (JSON: { result, bruto, ... })


// ─── EmployeeChangeCardStatus ─────────────────────────────────────────────────

// EmployeeChangeCardStatusRequest — promena statusa kartice od strane zaposlenog.
// Dozvoljene akcije: AKTIVNA→BLOKIRANA, BLOKIRANA→AKTIVNA, */→DEAKTIVIRANA.
message EmployeeChangeCardStatusRequest {
  string card_number = 1;  // broj kartice (path param)
  string status      = 2;  // "AKTIVNA" | "BLOKIRANA" | "DEAKTIVIRANA"
}

// ─── GetAllAccounts (Employee) ────────────────────────────────────────────────

// GetAllAccountsRequest — opcionalni filteri za listu svih računa.
// Prazno polje znači "bez filtera".
message GetAllAccountsRequest {
  string account_number = 1; // parcijalni match na broj_racuna (SQL ILIKE)
  string first_name     = 2; // parcijalni match na ime vlasnika (in-memory, case-insensitive)
  string last_name      = 3; // parcijalni match na prezime vlasnika (in-memory, case-insensitive)
}

// EmployeeAccountListItem je projekcija računa za zaposlene — sadrži podatke iz
// bank-service baze i ime/prezime vlasnika dohvaćeno sinhronim pozivom ka user-service-u.
message EmployeeAccountListItem {
  int64  id                = 1;
  string broj_racuna       = 2;
  string vrsta_racuna      = 3;  // "LICNI" | "POSLOVNI"
  string kategorija_racuna = 4;  // "TEKUCI" | "DEVIZNI"
  int64  vlasnik_id        = 5;
  string ime_vlasnika      = 6;
  string prezime_vlasnika  = 7;
}

message GetAllAccountsResponse {
  repeated EmployeeAccountListItem accounts = 1;
}

// ─── GetAccountCards (Employee) ───────────────────────────────────────────────

message GetAccountCardsRequest {
  string broj_racuna = 1;
}

// EmployeeKarticaListItem je projekcija kartice za portal zaposlenih.
// Vlasnik je vlasnik računa (ne ovlašćeno lice), dohvaćen iz user-service-a.
message EmployeeKarticaListItem {
  int64  id               = 1;
  string broj_kartice     = 2;
  string status           = 3;  // "AKTIVNA" | "BLOKIRANA" | "DEAKTIVIRANA"
  string ime_vlasnika     = 4;
  string prezime_vlasnika = 5;
  string email_vlasnika   = 6;
}

message GetAccountCardsResponse {
  repeated EmployeeKarticaListItem kartice = 1;
}

// ─── Berze (Exchanges) ───────────────────────────────────────────────────────

// MarketStatus opisuje trenutni status berze.
// Vrednosti se računaju u servisnom sloju na osnovu lokalnog vremena berze.
enum MarketStatus {
  MARKET_STATUS_UNSPECIFIED = 0;
  OPEN                      = 1;  // 09:30–16:00 lokalno
  PRE_MARKET                = 2;  // 07:00–09:30 lokalno
  AFTER_HOURS               = 3;  // 16:00–20:00 lokalno
  CLOSED                    = 4;  // van radnog vremena ili praznik/vikend
}

// Exchange predstavlja berzu hartija od vrednosti.
message Exchange {
  int64        id            = 1;
  string       name          = 2;    // naziv berze, e.g. "New York Stock Exchange"
  string       acronym       = 3;    // skraćenica, e.g. "NYSE"
  string       mic_code      = 4;    // ISO 10383 MIC kod, e.g. "XNYS"
  string       polity        = 5;    // država, e.g. "United States"
  int64        currency_id   = 6;    // FK na core_banking.valuta
  string       timezone      = 7;    // IANA timezone, e.g. "America/New_York"
  string       currency_name = 8;    // naziv valute, e.g. "Američki dolar"
  MarketStatus market_status = 9;    // trenutni status berze (računat u servisnom sloju)
}

message ListExchangesRequest {
  string polity = 1;  // filter po državi; "" = sve
  string search = 2;  // pretraga po name ili acronym; "" = sve
}

message ListExchangesResponse {
  repeated Exchange exchanges = 1;
}

message GetExchangeRequest {
  int64  id       = 1;  // 0 = nije prosleđen
  string mic_code = 2;  // "" = nije prosleđen
}

message ToggleMarketTestModeRequest {
  bool enabled = 1;  // true = uključi bypass radnog vremena, false = isključi
}

// ─── Listings (Hartije od vrednosti) ─────────────────────────────────────────

message ListingListItem {
  int64  id                  = 1;
  string ticker              = 2;
  string name                = 3;
  string listing_type        = 4;  // "STOCK" | "FOREX" | "FUTURE" | "OPTION"
  int64  exchange_id         = 5;
  double price               = 6;
  double ask                 = 7;
  double bid                 = 8;
  int64  volume              = 9;
  double change_percent      = 10;
  double dollar_volume       = 11;
  double initial_margin_cost = 12;
  string last_refresh        = 13; // ISO 8601 string; "" ako nikad nije osveženo
}

message ListingDetail {
  ListingListItem base      = 1;
  double nominal_value      = 2;
  double contract_size      = 3;
  double maintenance_margin = 4;
  string details_json       = 5; // raw JSON za FUTURE/OPTION dodatna polja
}

message ListingHistoryItem {
  string date         = 1; // "YYYY-MM-DD"
  double price        = 2;
  double ask_high     = 3;
  double bid_low      = 4;
  double price_change = 5;
  int64  volume       = 6;
}

message GetListingsRequest {
  string listing_type = 1; // "" = sve
  string search       = 2; // parcijalni match na ticker ili naziv
  double min_price    = 3; // 0 = bez filtera
  double max_price    = 4; // 0 = bez filtera
  int64  min_volume   = 5; // 0 = bez filtera
  string sort_by      = 6; // "price" | "volume" | "change" | "ticker"
  string sort_order   = 7; // "ASC" | "DESC"
  int32  page         = 8;
  int32  page_size    = 9;
  int64  max_volume   = 10; // 0 = bez filtera (gornja granica volumena)
  // Za FUTURE/OPTION: filter po settlement_date u details_json ("YYYY-MM-DD"); prazno = bez filtera
  string settlement_from = 11;
  string settlement_to   = 12;
}

message GetListingsResponse {
  repeated ListingListItem listings = 1;
  int32 total                       = 2;
}

message GetListingByIDRequest {
  int64 id = 1;
}

message GetListingHistoryRequest {
  int64  id        = 1;
  string from_date = 2; // "YYYY-MM-DD"; "" = bez donje granice
  string to_date   = 3; // "YYYY-MM-DD"; "" = danas
}

message GetListingHistoryResponse {
  repeated ListingHistoryItem history = 1;
}

// CreateListingOrderRequest — klijent kreira nalog za hartiju (validacija sredstava).
message CreateListingOrderRequest {
  int64  account_id    = 1;
  int64  listing_id    = 2;
  string side          = 3; // BUY | SELL
  string order_type    = 4; // MARKET | LIMIT | STOP
  double quantity      = 5;
  double limit_price   = 6; // za LIMIT; 0 inače
  double stop_price    = 7; // za STOP; 0 inače
}

message CreateListingOrderResponse {
  string message = 1;
}

// ─── Trading (Celina 4) ───────────────────────────────────────────────────────

// TradingOrder predstavlja jedan nalog za hartiju od vrednosti.
message TradingOrder {
  int64           id                 = 1;
  int64           user_id            = 2;
  int64           account_id         = 3;
  int64           listing_id         = 4;
  string          order_type         = 5;  // MARKET | LIMIT | STOP | STOP_LIMIT
  string          direction          = 6;  // BUY | SELL
  int32           quantity           = 7;
  int32           contract_size      = 8;
  optional string price_per_unit     = 9;  // nil za MARKET naloge
  optional string stop_price         = 10; // nil za MARKET i LIMIT naloge
  string          status             = 11; // PENDING | APPROVED | DECLINED | DONE | CANCELED
  optional string approved_by        = 12; // "No need for approval" | supervisor user id (decimal text) | empty until reviewed
  bool            is_done            = 13;
  int32           remaining_portions = 14;
  bool            after_hours        = 15;
  bool            all_or_none        = 16;
  bool            margin             = 17;
  string          last_modified      = 18; // ISO 8601
  string          created_at         = 19; // ISO 8601
}

// TradingCalculateRequest — ulazni parametri za procenu cene i provizije.
message TradingCalculateRequest {
  string          order_type    = 1; // MARKET | LIMIT | STOP | STOP_LIMIT
  string          direction     = 2; // BUY | SELL
  int64           listing_id    = 3;
  int32           quantity      = 4;
  int32           contract_size = 5;
  optional string price_per_unit = 6; // obavezno za LIMIT i STOP_LIMIT
  optional string stop_price    = 7;  // obavezno za STOP i STOP_LIMIT
  bool            margin        = 8;
  bool            all_or_none   = 9;
}

// TradingCalculateResponse — procenjena cena, provizija i (opciono) inicijalna marža.
message TradingCalculateResponse {
  string          price_per_unit      = 1;
  string          approximate_price   = 2;
  string          commission          = 3;
  optional string initial_margin_cost = 4; // samo kada je margin=true
}

// TradingCreateOrderRequest — sve potrebno za kreiranje naloga.
message TradingCreateOrderRequest {
  int64           account_id    = 1;
  int64           listing_id    = 2;
  string          order_type    = 3; // MARKET | LIMIT | STOP | STOP_LIMIT
  string          direction     = 4; // BUY | SELL
  int32           quantity      = 5;
  int32           contract_size = 6;
  optional string price_per_unit = 7;
  optional string stop_price    = 8;
  bool            after_hours   = 9;
  bool            all_or_none   = 10;
  bool            margin        = 11;
}

message TradingCreateOrderResponse {
  TradingOrder order = 1;
}

// TradingListOrdersRequest — opcionalni filter po statusu; prazno = svi nalozi.
message TradingListOrdersRequest {
  optional string status = 1;
}

message TradingListOrdersResponse {
  repeated TradingOrder orders = 1;
}

message TradingApproveOrderRequest {
  int64 order_id = 1;
}

message TradingApproveOrderResponse {
  TradingOrder order = 1;
}

message TradingDeclineOrderRequest {
  int64 order_id = 1;
}

message TradingDeclineOrderResponse {
  TradingOrder order = 1;
}

message TradingCancelOrderRequest {
  int64 order_id = 1;
}

message TradingCancelOrderResponse {
  TradingOrder order = 1;
}

// ─── Service ──────────────────────────────────────────────────────────────────

service BankaService {

  // GetCurrencies — javna metoda, vraća sve podržane valute.
  rpc GetCurrencies(google.protobuf.Empty) returns (GetCurrenciesResponse) {
    option (google.api.http) = {
      get: "/bank/currencies"
    };
  }

  // GetDelatnosti — javna metoda, vraća šifarnik delatnosti.
  rpc GetDelatnosti(google.protobuf.Empty) returns (GetDelatnostiResponse) {
    option (google.api.http) = {
      get: "/bank/delatnosti"
    };
  }

  // CreateAccount — Employee only. Kreira novi bankovni račun.
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse) {
    option (google.api.http) = {
      post: "/bank/accounts"
      body: "*"
    };
  }

  // GetClientAccounts — Client only. Vraća aktivne račune trenutno prijavljenog klijenta.
  rpc GetClientAccounts(google.protobuf.Empty) returns (GetClientAccountsResponse) {
    option (google.api.http) = {
      get: "/bank/client/accounts"
    };
  }

  // GetAccountDetail — Client only. Vraća detalje jednog računa.
  rpc GetAccountDetail(GetAccountDetailRequest) returns (AccountDetail) {
    option (google.api.http) = {
      get: "/bank/client/accounts/{id}"
    };
  }

  // GetAccountTransactions — Client only. Vraća transakcije za dati račun.
  rpc GetAccountTransactions(GetAccountTransactionsRequest) returns (GetAccountTransactionsResponse) {
    option (google.api.http) = {
      get: "/bank/client/accounts/{racun_id}/transactions"
    };
  }

  // RenameAccount — Client only. Menja naziv računa.
  rpc RenameAccount(RenameAccountRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      patch: "/bank/client/accounts/{id}/name"
      body: "*"
    };
  }

  // UpdateAccountLimit — Client only. Kreira pending action za promenu limita.
  rpc UpdateAccountLimit(UpdateAccountLimitRequest) returns (UpdateAccountLimitResponse) {
    option (google.api.http) = {
      patch: "/bank/client/accounts/{id}/limit"
      body: "*"
    };
  }

  // GetPendingAction — Client only. Vraća jednu pending akciju.
  rpc GetPendingAction(GetPendingActionRequest) returns (GetPendingActionResponse) {
    option (google.api.http) = {
      get: "/bank/transactions/{id}"
    };
  }

  // GetPendingActions — Client only. Vraća pending akcije za mobilni.
  // MORA biti registrovana POSLE GetPendingAction jer grpc-gateway v2 prepend-uje handlere
  // (poslje registrovani imaju prioritet). Statička ruta /pending mora pobediti {id}.
  rpc GetPendingActions(google.protobuf.Empty) returns (GetPendingActionsResponse) {
    option (google.api.http) = {
      get: "/bank/transactions/pending"
    };
  }

  // ApprovePendingAction — Client only. Odobrava akciju i generiše verifikacioni kod.
  rpc ApprovePendingAction(ApprovePendingActionRequest) returns (ApprovePendingActionResponse) {
    option (google.api.http) = {
      post: "/bank/transactions/{id}/approve"
      body: "*"
    };
  }

  // VerifyLimitChange — Client only. Proverava kod i primenjuje promenu limita.
  rpc VerifyLimitChange(VerifyLimitChangeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/bank/client/pending-actions/{id}/verify"
      body: "*"
    };
  }

  // ── Primaoci plaćanja ─────────────────────────────────────────────────────

  // GetPaymentRecipients — Client only. Lista sačuvanih primalaca.
  rpc GetPaymentRecipients(google.protobuf.Empty) returns (GetPaymentRecipientsResponse) {
    option (google.api.http) = {
      get: "/bank/client/payment-recipients"
    };
  }

  // CreatePaymentRecipient — Client only. Dodaje novog primaoca.
  rpc CreatePaymentRecipient(CreatePaymentRecipientRequest) returns (PaymentRecipientItem) {
    option (google.api.http) = {
      post: "/bank/client/payment-recipients"
      body: "*"
    };
  }

  // UpdatePaymentRecipient — Client only. Menja primaoca.
  rpc UpdatePaymentRecipient(UpdatePaymentRecipientRequest) returns (PaymentRecipientItem) {
    option (google.api.http) = {
      patch: "/bank/client/payment-recipients/{id}"
      body: "*"
    };
  }

  // DeletePaymentRecipient — Client only. Briše primaoca.
  rpc DeletePaymentRecipient(DeletePaymentRecipientRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/bank/client/payment-recipients/{id}"
    };
  }

  // ── Plaćanja i prenosi ────────────────────────────────────────────────────

  // CreatePaymentIntent — Client only. Kreira nalog plaćanja i pokreće verifikaciju.
  rpc CreatePaymentIntent(CreatePaymentIntentRequest) returns (CreatePaymentIntentResponse) {
    option (google.api.http) = {
      post: "/bank/client/payments"
      body: "*"
    };
  }

  // CreateTransferIntent — Client only. Kreira nalog prenosa između računa istog klijenta.
  rpc CreateTransferIntent(CreateTransferIntentRequest) returns (CreatePaymentIntentResponse) {
    option (google.api.http) = {
      post: "/bank/client/transfers"
      body: "*"
    };
  }

  // VerifyAndExecutePayment — Client only. Proverava verifikacioni kod i izvršava plaćanje.
  rpc VerifyAndExecutePayment(VerifyPaymentRequest) returns (PaymentIntentItem) {
    option (google.api.http) = {
      post: "/bank/client/payments/{intent_id}/verify"
      body: "*"
    };
  }

  // ── Istorija plaćanja ─────────────────────────────────────────────────────

  // GetPaymentHistory — Client only. Istorija plaćanja sa filterima.
  rpc GetPaymentHistory(GetPaymentHistoryRequest) returns (GetPaymentHistoryResponse) {
    option (google.api.http) = {
      get: "/bank/client/payments"
    };
  }

  // GetPaymentDetail — Client only. Detalji jednog naloga.
  rpc GetPaymentDetail(GetPaymentDetailRequest) returns (PaymentIntentItem) {
    option (google.api.http) = {
      get: "/bank/client/payments/{id}"
    };
  }

  // ── Krediti (Loans) — Client ──────────────────────────────────────────────

  // ApplyForCredit — Client only. Podnosi zahtev za novi kredit.
  rpc ApplyForCredit(ApplyForCreditRequest) returns (ApplyForCreditResponse) {
    option (google.api.http) = {
      post: "/api/v1/client/credits"
      body: "*"
    };
  }

  // GetClientCredits — Client only. Vraća sve kredite prijavljenog klijenta, sortirano opadajuće po iznosu.
  rpc GetClientCredits(google.protobuf.Empty) returns (GetClientCreditsResponse) {
    option (google.api.http) = {
      get: "/api/v1/client/credits"
    };
  }

  // GetCreditDetails — Client only. Vraća detalje i rate za jedan kredit.
  rpc GetCreditDetails(GetCreditDetailsRequest) returns (GetCreditDetailsResponse) {
    option (google.api.http) = {
      get: "/api/v1/client/credits/{id}"
    };
  }

  // ── Krediti (Loans) — Employee ────────────────────────────────────────────

  // GetAllCreditRequests — Employee only. Vraća sve zahteve za kredit sa opcionim filterima.
  rpc GetAllCreditRequests(GetAllCreditRequestsRequest) returns (GetAllCreditRequestsResponse) {
    option (google.api.http) = {
      get: "/api/v1/employee/credits/requests"
    };
  }

  // ApproveCredit — Employee only. Odobrava zahtev za kredit i uplaćuje iznos na račun klijenta.
  rpc ApproveCredit(ApproveCreditRequest) returns (ApproveCreditResponse) {
    option (google.api.http) = {
      post: "/api/v1/employee/credits/requests/{id}/approve"
      body: "*"
    };
  }

  // RejectCredit — Employee only. Odbija zahtev za kredit.
  rpc RejectCredit(RejectCreditRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/employee/credits/requests/{id}/reject"
      body: "*"
    };
  }

  // GetAllApprovedCredits — Employee only. Vraća sve odobrene kredite sa opcionim filterima, sortirano po broju računa.
  rpc GetAllApprovedCredits(GetAllApprovedCreditsRequest) returns (GetAllApprovedCreditsResponse) {
    option (google.api.http) = {
      get: "/api/v1/employee/credits"
    };
  }

  // EmployeeChangeCardStatus — Employee only. Menja status kartice (blokada/deblokada/deaktivacija).
  // Nakon uspešne promene šalje asinhronu email notifikaciju vlasniku, a za poslovne račune
  // i ovlašćenom licu (email se čita iz lokalne baze, bez dodatnog poziva ka user-service-u).
  rpc EmployeeChangeCardStatus(EmployeeChangeCardStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      patch: "/bank/employee/cards/{card_number}/status"
      body: "*"
    };
  }

  // GetAllAccounts — Employee only. Vraća agregiranu listu svih računa klijenata,
  // sortiranu abecedno po prezimenu vlasnika. Podržava filtere po broju računa,
  // imenu i prezimenu vlasnika (prosleđuju se kao query parametri).
  rpc GetAllAccounts(GetAllAccountsRequest) returns (GetAllAccountsResponse) {
    option (google.api.http) = {
      get: "/bank/employee/accounts"
    };
  }

  // GetAccountCards — Employee only. Vraća sve kartice vezane za dati račun.
  // Ime, prezime i email vlasnika dohvataju se sinhronim pozivom ka user-service-u.
  rpc GetAccountCards(GetAccountCardsRequest) returns (GetAccountCardsResponse) {
    option (google.api.http) = {
      get: "/bank/employee/accounts/{broj_racuna}/cards"
    };
  }

  // ── Berze (Exchanges) ─────────────────────────────────────────────────────

  // ListExchanges — javna metoda. Vraća listu berzi sa opcionim filterima.
  // Filteri: polity (tačno poklapanje), search (parcijalni match na name/acronym).
  rpc ListExchanges(ListExchangesRequest) returns (ListExchangesResponse) {
    option (google.api.http) = {
      get: "/bank/exchanges"
    };
  }

  // GetExchange — javna metoda. Dohvata jednu berzu po ID-u ili MIC kodu.
  // Prosleđuje se ili id (path param) ili mic_code (query param) — ne oba.
  rpc GetExchange(GetExchangeRequest) returns (Exchange) {
    option (google.api.http) = {
      get: "/bank/exchanges/{id}"
      additional_bindings: {
        get: "/bank/exchanges/mic/{mic_code}"
      }
    };
  }

  // ToggleMarketTestMode — Admin/Employee only. Uključuje ili isključuje
  // bypass radnog vremena berzi (čuva se u Redisu pod ključem market:test_mode).
  rpc ToggleMarketTestMode(ToggleMarketTestModeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/bank/admin/exchanges/test-mode"
      body: "*"
    };
  }

  // ── Hartije od vrednosti (Listings) ──────────────────────────────────────

  // GetListings — Client only. Vraća listu hartija sa filterima i paginacijom.
  rpc GetListings(GetListingsRequest) returns (GetListingsResponse) {
    option (google.api.http) = {
      get: "/bank/listings"
    };
  }

  // GetListingByID — Client only. Vraća detalje jedne hartije po ID-u.
  rpc GetListingByID(GetListingByIDRequest) returns (ListingDetail) {
    option (google.api.http) = {
      get: "/bank/listings/{id}"
    };
  }

  // GetListingHistory — Client only. Vraća istoriju dnevnih cena za datu hartiju.
  rpc GetListingHistory(GetListingHistoryRequest) returns (GetListingHistoryResponse) {
    option (google.api.http) = {
      get: "/bank/listings/{id}/history"
    };
  }

  // CreateListingOrder — Client only. Provera raspoloživog stanja; ne knjiži trgovinu (Celina 4).
  rpc CreateListingOrder(CreateListingOrderRequest) returns (CreateListingOrderResponse) {
    option (google.api.http) = {
      post: "/bank/listings/orders"
      body: "*"
    };
  }

  // ─── Trading (Celina 4) ───────────────────────────────────────────────────

  // TradingCalculate — Authenticated. Vraća procenu cene i provizije bez perzistencije.
  rpc TradingCalculate(TradingCalculateRequest) returns (TradingCalculateResponse) {
    option (google.api.http) = {
      post: "/bank/trading/calculate"
      body: "*"
    };
  }

  // TradingCreateOrder — Authenticated. Kreira novi nalog; workflow odobravanja je u servisu.
  rpc TradingCreateOrder(TradingCreateOrderRequest) returns (TradingCreateOrderResponse) {
    option (google.api.http) = {
      post: "/bank/trading/orders"
      body: "*"
    };
  }

  // TradingListOrders — Employee only. Lista naloga sa opcionim filterom statusa.
  rpc TradingListOrders(TradingListOrdersRequest) returns (TradingListOrdersResponse) {
    option (google.api.http) = {
      get: "/bank/trading/orders"
    };
  }

  // TradingApproveOrder — Employee only. Odobrava PENDING nalog.
  rpc TradingApproveOrder(TradingApproveOrderRequest) returns (TradingApproveOrderResponse) {
    option (google.api.http) = {
      post: "/bank/trading/orders/{order_id}/approve"
      body: "*"
    };
  }

  // TradingDeclineOrder — Employee only. Odbija PENDING nalog.
  rpc TradingDeclineOrder(TradingDeclineOrderRequest) returns (TradingDeclineOrderResponse) {
    option (google.api.http) = {
      post: "/bank/trading/orders/{order_id}/decline"
      body: "*"
    };
  }

  // TradingCancelOrder — Vlasnik naloga ili Employee. Otkazuje aktivan nalog.
  rpc TradingCancelOrder(TradingCancelOrderRequest) returns (TradingCancelOrderResponse) {
    option (google.api.http) = {
      post: "/bank/trading/orders/{order_id}/cancel"
      body: "*"
    };
  }
}
